version: 2
updates:
  # Go module dependencies.
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # Batch minor/patch bumps into a single PR to cut noise.
      # Major bumps still arrive as individual PRs.
      go-minor-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions used by the workflows in this repo.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        update-types:
          - minor
          - patch
